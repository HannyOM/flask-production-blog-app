<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <script src="https://cdn.flowbite.com/flowbite.js"></script>
    <style>
        .ProseMirror {
            outline: none;
            min-height: 300px;
            padding: 1rem;
        }
        .ProseMirror p {
            margin: 0.5em 0;
        }
        .ProseMirror h1, .ProseMirror h2, .ProseMirror h3, 
        .ProseMirror h4, .ProseMirror h5, .ProseMirror h6 {
            margin: 0.75em 0 0.5em;
        }
        .ProseMirror h1 { font-size: 2.25em; font-weight: 700; }
        .ProseMirror h2 { font-size: 1.875em; font-weight: 600; }
        .ProseMirror h3 { font-size: 1.5em; font-weight: 600; }
        .ProseMirror h4 { font-size: 1.25em; font-weight: 600; }
        .ProseMirror h5 { font-size: 1.125em; font-weight: 600; }
        .ProseMirror h6 { font-size: 1em; font-weight: 600; }
        .ProseMirror ul, .ProseMirror ol {
            padding-left: 1.5em;
            margin: 0.5em 0;
        }
        .ProseMirror blockquote {
            border-left: 3px solid #d1d5db;
            padding-left: 1em;
            margin: 0.75em 0;
            color: #6b7280;
        }
        .ProseMirror pre {
            background: #1f2937;
            color: #f3f4f6;
            padding: 1em;
            border-radius: 0.5em;
            overflow-x: auto;
        }
        .ProseMirror code {
            background: #f3f4f6;
            padding: 0.125em 0.25em;
            border-radius: 0.25em;
            font-family: 'Courier New', Courier, monospace;
        }
        .ProseMirror pre code {
            background: none;
            padding: 0;
        }
        .ProseMirror a {
            color: #2563eb;
            text-decoration: underline;
        }
        .ProseMirror hr {
            border: none;
            border-top: 2px solid #d1d5db;
            margin: 1em 0;
        }
        .ProseMirror p.is-editor-empty:first-child::before {
            content: attr(data-placeholder);
            float: left;
            color: #9ca3af;
            pointer-events: none;
            height: 0;
        }
        .editor-toolbar button {
            padding: 0.375rem;
            border-radius: 0.375rem;
            transition: all 0.15s;
        }
        .editor-toolbar button:hover {
            background-color: #e5e7eb;
        }
        .editor-toolbar select {
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            border: 1px solid #d1d5db;
            font-size: 0.875rem;
            background: white;
        }
    </style>
</head>

<body>
    <!-- Radial Gradient Background from Top -->
    <div class="fixed inset-0 z-0" style="background: radial-gradient(125% 125% at 50% 10%, #fff 40%, #475569 100%);"></div>
    <!-- Main Content -->
    <div class="relative z-10">
    {% block content %}{% endblock %}
    </div>

    <!-- User Card Popup -->
    <div id="user-card-popup" class="fixed z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl border border-gray-200 p-4 w-72" id="user-card-content">
            <button type="button" id="user-card-close" class="absolute top-2 right-2 text-gray-400 hover:text-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
            <div class="flex items-center space-x-3 mb-3">
                <div class="w-12 h-12 rounded-full bg-gray-200 flex items-center justify-center flex-shrink-0">
                    <span id="popup-avatar" class="text-lg font-medium text-gray-600"></span>
                </div>
                <div class="min-w-0">
                    <p id="popup-username" class="font-semibold text-black truncate"></p>
                    <p id="popup-joined" class="text-xs text-gray-500"></p>
                </div>
            </div>
            <div id="popup-roles" class="flex flex-wrap gap-1 mb-3"></div>
            <p id="popup-post-count" class="text-sm text-gray-600 mb-3"></p>
            <a id="popup-link" href="#" class="block w-full text-center px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
                View Profile
            </a>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const popup = document.getElementById('user-card-popup');
        const popupContent = document.getElementById('user-card-content');
        const closeBtn = document.getElementById('user-card-close');
        const triggers = document.querySelectorAll('.user-card-trigger');

        function showPopup(trigger) {
            const userId = trigger.dataset.userId;
            if (!userId) return;

            fetch('/api/user/' + userId)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('popup-avatar').textContent = data.username[0].toUpperCase();
                    document.getElementById('popup-username').textContent = data.username;
                    document.getElementById('popup-joined').textContent = 'Joined ' + data.joined;
                    document.getElementById('popup-link').href = '/profile/' + data.username;
                    document.getElementById('popup-post-count').textContent = data.post_count + ' article' + (data.post_count !== 1 ? 's' : '');

                    const rolesContainer = document.getElementById('popup-roles');
                    rolesContainer.innerHTML = '';
                    data.roles.forEach(role => {
                        const span = document.createElement('span');
                        span.className = 'px-2 py-1 text-xs font-medium text-blue-600 bg-blue-50 rounded';
                        span.textContent = role;
                        rolesContainer.appendChild(span);
                    });

                    const rect = trigger.getBoundingClientRect();
                    const popupRect = popupContent.getBoundingClientRect();
                    let top = rect.bottom + 8;
                    let left = rect.left;

                    if (top + popupRect.height > window.innerHeight) {
                        top = rect.top - popupRect.height - 8;
                    }
                    if (left + popupRect.width > window.innerWidth) {
                        left = window.innerWidth - popupRect.width - 16;
                    }

                    popup.style.top = top + 'px';
                    popup.style.left = left + 'px';
                    popup.classList.remove('hidden');
                });
        }

        function hidePopup() {
            popup.classList.add('hidden');
        }

        triggers.forEach(trigger => {
            trigger.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                showPopup(this);
            });
        });

        closeBtn.addEventListener('click', hidePopup);

        document.addEventListener('click', function(e) {
            if (!popup.contains(e.target) && !e.target.closest('.user-card-trigger')) {
                hidePopup();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                hidePopup();
            }
        });
    });
    </script>
</body>

</html>
