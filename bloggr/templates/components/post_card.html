{% macro post_card(post, link) %}
<a href="{{ link }}" class="block bg-white rounded-lg border border-gray-200 p-5 hover:shadow-md transition-shadow duration-300">
    <div class="mb-3">
        <span class="inline-block px-2 py-1 text-xs font-medium text-blue-600 bg-blue-50 rounded">
            Blog
        </span>
    </div>
    <h3 class="text-lg font-bold text-black mb-2 hover:text-blue-600 transition-colors">
        {{ post.title }}
    </h3>
    <p class="text-gray-600 text-sm mb-4 line-clamp-2">
        {{ (post.content|striptags)[:150] }}{% if post.content|length > 150 %}...{% endif %}
    </p>
    <div class="flex items-center justify-between pt-3 border-t border-gray-100">
        <div class="flex items-center space-x-2">
            <div class="w-7 h-7 rounded-full bg-gray-200 flex items-center justify-center">
                <span class="text-xs font-medium text-gray-600">
                    {{ post.author.username[0]|upper }}
                </span>
            </div>
            <span class="text-sm text-gray-600">{{ post.author.username }}</span>
        </div>
        <time class="text-xs text-gray-500">
            {{ post.date.strftime("%b %d") }}
        </time>
    </div>
</a>
{% endmacro %}
